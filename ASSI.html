<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <style>
    body {
      overflow-x: hidden;
      background-color: #f8f9fa;
    }

    /* Sidebar */
    .sidebar {
      height: 100vh;
      background: #343a40;
      color: white;
      position: fixed;
      width: 250px;
    }

    .sidebar a {
      color: #adb5bd;
      text-decoration: none;
      display: block;
      padding: 12px 20px;
    }

    .sidebar a:hover {
      background: #495057;
      color: white;
    }

    /* Content */
    .content {
      margin-left: 250px;
      padding: 20px;
    }

    /* Cards */
    .card {
      border: none;
      border-radius: 12px;
    }

    .card h5 {
      font-size: 16px;
    }

    .card h2 {
      font-weight: bold;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        position: relative;
        width: 100%;
        height: auto;
      }

      .content {
        margin-left: 0;
      }
    }
  </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar p-3">
  <h4 class="text-center">Admin Panel</h4>
  <hr>
  <a href="#">Dashboard</a>
  <a href="#">Students</a>
  <a href="#">Courses</a>
  <a href="#">Exams</a>
  <a href="#">Orders</a>
  <a href="#">Reports</a>
  <a href="#">Settings</a>
</div>

<!-- Main Content -->
<div class="content">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
    <div class="container-fluid">
      <span class="navbar-brand">Dashboard</span>
      <button class="btn btn-outline-primary">Logout</button>
    </div>
  </nav>

  <!-- Stats Cards -->
  <div class="row g-4">

    <div class="col-md-3">
      <div class="card shadow-sm p-3 bg-primary text-white">
        <h5>Total Students</h5>
        <h2>1,250</h2>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow-sm p-3 bg-success text-white">
        <h5>Total Courses</h5>
        <h2>85</h2>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow-sm p-3 bg-warning text-dark">
        <h5>Exams Scheduled</h5>
        <h2>32</h2>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow-sm p-3 bg-danger text-white">
        <h5>Total Revenue</h5>
        <h2>₹2.4L</h2>
      </div>
    </div>

  </div>

  <!-- Table Section -->
  <div class="mt-5">
    <h4>Recent Activity</h4>
    <div class="card shadow-sm p-3">
      <table class="table table-striped">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Course</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>Rahul Sharma</td>
            <td>BCA</td>
            <td><span class="badge bg-success">Active</span></td>
          </tr>
          <tr>
            <td>2</td>
            <td>Priya Singh</td>
            <td>MBA</td>
            <td><span class="badge bg-warning text-dark">Pending</span></td>
          </tr>
          <tr>
            <td>3</td>
            <td>Amit Verma</td>
            <td>B.Tech</td>
            <td><span class="badge bg-danger">Inactive</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
